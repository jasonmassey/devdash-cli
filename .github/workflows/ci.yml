name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint
        run: |
          sudo apt-get install -y shellcheck
          shellcheck --exclude=SC2016,SC2034,SC2059 bin/devdash
          shellcheck test/helpers.sh test/test_offline.sh test/test_api.sh test/mock/curl

      - name: Test
        run: bash test/test.sh
